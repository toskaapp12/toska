name: CI

# Runs on every PR and on every push to main. Catches:
#   - broken firestore.rules (the unit-test suite under firestore-tests/)
#   - syntax errors in Cloud Functions JS that would silently fail to deploy
# Does not yet build the iOS app — that needs GoogleService-Info.plist
# decoded from a secret on a macOS runner. RUNBOOK.md describes the
# setup if/when we want to add it.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run if a new commit lands on the same branch — saves
# minutes when iterating on a PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rules-tests:
    name: Firestore rules unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: firestore-tests/package-lock.json

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install firebase-tools
      # Pinned to the major version Firebase docs reference. firebase-tools
      # 15+ requires Java 21 (set up above).
      run: npm install -g firebase-tools@15

    - name: Install test dependencies
      working-directory: firestore-tests
      run: npm install --no-audit --no-fund

    - name: Run rules unit tests
      working-directory: firestore-tests
      # Boots firestore + auth emulators, runs mocha against firestore.test.js,
      # tears emulators down. Same as `npm test` locally but without the
      # macOS-specific PATH prefix.
      run: |
        firebase emulators:exec --only firestore,auth --project=toska-test \
          'mocha --timeout 15000 firestore.test.js'

  functions-syntax:
    name: Cloud Functions syntax check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Syntax-check JS files
      # node --check parses each file without executing. Catches typos that
      # would land in production and silently fail at function cold-start.
      run: |
        node --check functions/index.js
        node --check functions/cleanup.js
        node --check functions/scrubLegacyPII.js
