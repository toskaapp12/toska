<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toska admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0908; color: #e0e2e6; min-height: 100vh; }
        .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
        .login h1 { font-family: Georgia, serif; font-style: italic; font-size: 28px; color: #fff; margin-bottom: 8px; }
        .login input { background: #1a1c22; border: 1px solid #2a2c32; color: #e0e2e6; padding: 10px 14px; border-radius: 8px; font-size: 14px; width: 280px; }
        .login button { background: #4a6fa5; color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .login button:hover { background: #5a7fb5; }
        .login .error { color: #c45c5c; font-size: 12px; }
        .header { padding: 16px 24px; border-bottom: 1px solid #1c1e1f; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-family: Georgia, serif; font-style: italic; font-size: 18px; color: #fff; }
        .header .right { display: flex; gap: 12px; align-items: center; }
        .header .stat { font-size: 11px; color: #85898f; }
        .header .stat strong { color: #e0e2e6; }
        .header button { background: none; border: 1px solid #2a2c32; color: #85898f; padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .tabs { display: flex; gap: 4px; padding: 12px 24px; border-bottom: 1px solid #1c1e1f; }
        .tabs button { background: none; border: none; color: #85898f; font-size: 12px; padding: 6px 14px; border-radius: 16px; cursor: pointer; }
        .tabs button.active { background: #1c1e1f; color: #e0e2e6; font-weight: 600; }
        .content { max-width: 800px; margin: 0 auto; padding: 16px 24px; }
        .card { background: #121314; border: 1px solid #1c1e1f; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-type { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 4px; }
        .type-post { background: #4a6fa520; color: #4a6fa5; }
        .type-reply { background: #8b7ec820; color: #8b7ec8; }
        .type-user { background: #c49a6c20; color: #c49a6c; }
        .type-conversation { background: #6ba58e20; color: #6ba58e; }
        .card-time { font-size: 10px; color: #555960; }
        .card-reason { font-size: 11px; color: #c45c5c; margin-bottom: 6px; }
        .card-text { font-family: Georgia, serif; font-size: 14px; color: #b0b3b8; line-height: 1.6; margin-bottom: 10px; padding: 12px; background: #0a0908; border-radius: 6px; white-space: pre-wrap; word-break: break-word; }
        .card-meta { font-size: 10px; color: #555960; margin-bottom: 12px; }
        .card-meta span { margin-right: 12px; }
        .card-actions { display: flex; gap: 8px; }
        .card-actions button { border: none; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; }
        .btn-dismiss { background: #1c1e1f; color: #85898f; }
        .btn-dismiss:hover { background: #2a2c32; }
        .btn-remove { background: #c45c5c20; color: #c45c5c; }
        .btn-remove:hover { background: #c45c5c30; }
        .btn-restrict { background: #c49a6c20; color: #c49a6c; }
        .btn-restrict:hover { background: #c49a6c30; }
        .empty { text-align: center; padding: 60px 20px; color: #555960; }
        .empty h2 { font-family: Georgia, serif; font-style: italic; font-size: 18px; color: #85898f; margin-bottom: 8px; }
        .flagged-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 4px; background: #c45c5c15; color: #c45c5c; }
        .status-resolved { opacity: 0.4; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1e1f; color: #6ba58e; padding: 10px 20px; border-radius: 8px; font-size: 12px; display: none; z-index: 100; border: 1px solid #6ba58e30; }
        .loading { text-align: center; padding: 40px; color: #555960; }
    </style>
</head>
<body>
    <div id="loginView" class="login" style="display:none;">
        <h1>toska admin</h1>
        <input type="email" id="email" placeholder="email" autocomplete="email">
        <input type="password" id="password" placeholder="password" autocomplete="current-password">
        <button id="signInBtn">sign in</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="appView" style="display:none;">
        <div class="header">
            <h1>toska admin</h1>
            <div class="right">
                <span class="stat">pending: <strong id="pendingCount">0</strong></span>
                <span class="stat">flagged: <strong id="flaggedCount">0</strong></span>
                <button id="signOutBtn">sign out</button>
            </div>
        </div>
        <div class="tabs">
            <button class="active" data-tab="reports">reports</button>
            <button data-tab="flagged">flagged posts</button>
            <button data-tab="restricted">restricted users</button>
        </div>
        <div class="content" id="content">
            <div class="loading">loading...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        // ============================================================
        // SECURITY NOTE — admin.html
        //
        // This page IS publicly accessible: docs/CNAME points at
        // www.toskaapp.com and the /docs directory is served via GitHub
        // Pages. (The previous comment claiming "not publicly served" was
        // outdated — only the firebase.json hosting block was missing.)
        //
        // The security perimeter is therefore the Firestore rules:
        //   - admins/{uid} read: if isOwner(uid)  → admin status check
        //   - reports update: isAdmin()           → resolve / dismiss
        //   - users update {restricted, ...}: isAdmin() → restrict / unrestrict
        //   - posts update {flagged}: isAdmin()   → unflag / delete
        // A non-admin who signs in here passes the auth gate but every
        // privileged write is denied server-side.
        //
        // Defense-in-depth applied below:
        //   1. All user-controlled strings (handles, reason labels, text,
        //      post IDs) are rendered via .textContent or DOM API helpers
        //      that auto-escape — no innerHTML interpolation. This blocks
        //      stored-XSS via crafted handles that would otherwise run JS
        //      in the admin's authenticated session and hijack moderation
        //      privileges (the realistic attack class).
        //   2. firestore.rules also constrains handles to
        //      ^[a-zA-Z0-9_-]+$ at create + update, so the dangerous
        //      payload can't even land in Firestore in the first place.
        //
        // Recommended next step: enable Firebase App Check with a
        // reCAPTCHA Enterprise provider (the initializeAppCheck call
        // below) so non-attested origins can't hit Firestore even with
        // a stolen ID token. The site key is a public identifier — safe
        // to commit once you have one.
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, limit, getDocs, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCttNQOgw3r5TqON7v1kgUQs_dWilDO5oE",
            authDomain: "toska-4ebf4.firebaseapp.com",
            projectId: "toska-4ebf4",
            storageBucket: "toska-4ebf4.firebasestorage.app",
            messagingSenderId: "183467627187",
            appId: "1:183467627187:ios:ce1217a856e980f70756c6"
        });

        // App Check via reCAPTCHA Enterprise. Once a site key is set
        // below, every Firestore read/write from this dashboard carries
        // an App Check token; combined with the iOS client's App Attest
        // enforcement, this restricts all Firestore traffic to attested
        // toska clients. A non-attested origin (random browser tab,
        // headless scraper, stolen admin session moved to another
        // device) is rejected at the API layer even with a valid auth
        // token.
        //
        // To enable:
        //   1. Cloud Console → reCAPTCHA Enterprise → Create key →
        //      type: web, allowed domains: www.toskaapp.com
        //   2. Copy the site key (starts with 6L... — public, safe to
        //      commit) and replace RECAPTCHA_SITE_KEY below
        //   3. Firebase Console → App Check → Web app → register the
        //      reCAPTCHA Enterprise provider with the same site key
        //   4. Wait for the unverified-request rate to drop near zero in
        //      the App Check metrics, then flip enforcement to "Enforced"
        //      on Cloud Firestore
        //
        // Until step 2 is done, the constant below stays empty and the
        // initializeAppCheck call is skipped — the dashboard keeps
        // working without App Check. No fail-closed surprise.
        const RECAPTCHA_SITE_KEY = ""; // TODO: paste reCAPTCHA Enterprise site key
        if (RECAPTCHA_SITE_KEY) {
            const { initializeAppCheck, ReCaptchaEnterpriseProvider } =
                await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-app-check.js");
            initializeAppCheck(app, {
                provider: new ReCaptchaEnterpriseProvider(RECAPTCHA_SITE_KEY),
                isTokenAutoRefreshEnabled: true,
            });
        }

        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentTab = "reports";

        // --- DOM helpers ---
        // setText / setTextChild / appendSpan all route user-controlled
        // strings through textContent or document.createTextNode, which
        // auto-escape into a text node — no chance of HTML/JS injection
        // even if the string contains <, >, ', ", & or other markup.

        function el(tag, className) {
            const node = document.createElement(tag);
            if (className) node.className = className;
            return node;
        }

        function span(className, text) {
            const s = el("span", className);
            s.textContent = text ?? "";
            return s;
        }

        function emptyState(container, title, body) {
            container.replaceChildren();
            const wrap = el("div", "empty");
            const h2 = el("h2");
            h2.textContent = title;
            const p = el("p");
            p.textContent = body;
            wrap.append(h2, p);
            container.appendChild(wrap);
        }

        function loadingState(container, message = "loading...") {
            container.replaceChildren();
            const wrap = el("div", "loading");
            wrap.textContent = message;
            container.appendChild(wrap);
        }

        // Type tag — bounded by firestore.rules to one of four enum
        // values, but we still treat it carefully: only attach the
        // class suffix if the value matches the allowlist.
        const ALLOWED_TYPES = new Set(["post", "reply", "user", "conversation"]);
        function typeBadge(type) {
            const safeType = ALLOWED_TYPES.has(type) ? type : "post";
            const s = span(`card-type type-${safeType}`);
            s.textContent = safeType;
            return s;
        }

        // --- Auth wiring ---

        document.getElementById("signInBtn").addEventListener("click", signIn);
        document.getElementById("signOutBtn").addEventListener("click", () => fbSignOut(auth));
        document.querySelectorAll(".tabs button[data-tab]").forEach(btn => {
            btn.addEventListener("click", () => switchTab(btn.dataset.tab, btn));
        });

        async function signIn() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errEl = document.getElementById("loginError");
            errEl.textContent = "";
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (e) {
                errEl.textContent = e.message;
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            loadTab();
        }

        onAuthStateChanged(auth, async (user) => {
            const errEl = document.getElementById("loginError");
            if (user) {
                const adminDoc = await getDoc(doc(db, "admins", user.uid));
                if (adminDoc.exists() && adminDoc.data().role === "admin") {
                    document.getElementById("loginView").style.display = "none";
                    document.getElementById("appView").style.display = "block";
                    loadTab();
                } else {
                    errEl.textContent = "not an admin account";
                    await fbSignOut(auth);
                    document.getElementById("loginView").style.display = "flex";
                }
            } else {
                document.getElementById("loginView").style.display = "flex";
                document.getElementById("appView").style.display = "none";
            }
        });

        async function loadTab() {
            const content = document.getElementById("content");
            loadingState(content);
            if (currentTab === "reports") await loadReports(content);
            else if (currentTab === "flagged") await loadFlagged(content);
            else if (currentTab === "restricted") await loadRestricted(content);
        }

        // --- Reports ---

        async function loadReports(container) {
            try {
                const q = query(collection(db, "reports"), where("status", "==", "pending"), orderBy("createdAt", "desc"), limit(50));
                const snap = await getDocs(q);
                document.getElementById("pendingCount").textContent = snap.size;

                if (snap.empty) {
                    emptyState(container, "nothing to review", "no pending reports right now");
                    return;
                }

                container.replaceChildren();
                snap.forEach(d => {
                    const r = d.data();
                    const time = r.createdAt?.toDate?.() ? timeAgo(r.createdAt.toDate()) : "unknown";

                    const card = el("div", "card");
                    card.id = `report-${d.id}`;

                    const header = el("div", "card-header");
                    header.append(typeBadge(r.type), span("card-time", time));
                    card.appendChild(header);

                    const reasonText = r.reasonLabel || r.reason || "";
                    const reasonDiv = el("div", "card-reason");
                    reasonDiv.textContent = `reason: ${reasonText}`;
                    card.appendChild(reasonDiv);

                    if (r.text) {
                        const textDiv = el("div", "card-text");
                        textDiv.textContent = r.text;
                        card.appendChild(textDiv);
                    }

                    const meta = el("div", "card-meta");
                    const reportedSpan = el("span");
                    reportedSpan.textContent = `reported: ${r.reportedHandle || "unknown"}`;
                    meta.appendChild(reportedSpan);
                    if (r.postId) {
                        const postSpan = el("span");
                        // .slice(0,8) is a display nicety; the full id stays in
                        // the click closure below so the action handler hits the
                        // correct doc. Both go through textContent.
                        postSpan.textContent = `post: ${String(r.postId).slice(0, 8)}...`;
                        meta.appendChild(postSpan);
                    }
                    card.appendChild(meta);

                    const actions = el("div", "card-actions");

                    const dismissBtn = el("button", "btn-dismiss");
                    dismissBtn.textContent = "dismiss";
                    dismissBtn.addEventListener("click", () => dismissReport(d.id));
                    actions.appendChild(dismissBtn);

                    if (r.postId) {
                        const removeBtn = el("button", "btn-remove");
                        removeBtn.textContent = "remove post";
                        removeBtn.addEventListener("click", () => removePost(d.id, r.postId));
                        actions.appendChild(removeBtn);
                    }

                    if (r.reportedUserId) {
                        const restrictBtn = el("button", "btn-restrict");
                        restrictBtn.textContent = "restrict user";
                        restrictBtn.addEventListener("click", () => restrictUser(d.id, r.reportedUserId, r.reportedHandle));
                        actions.appendChild(restrictBtn);
                    }

                    card.appendChild(actions);
                    container.appendChild(card);
                });
            } catch (e) {
                emptyState(container, "error loading reports", e.message);
            }
        }

        // --- Flagged posts ---

        async function loadFlagged(container) {
            try {
                const q = query(collection(db, "posts"), where("flagged", "==", true), orderBy("createdAt", "desc"), limit(50));
                const snap = await getDocs(q);
                document.getElementById("flaggedCount").textContent = snap.size;

                if (snap.empty) {
                    emptyState(container, "no flagged posts", "auto-moderation hasn't flagged anything");
                    return;
                }

                container.replaceChildren();
                snap.forEach(d => {
                    const p = d.data();
                    const time = p.createdAt?.toDate?.() ? timeAgo(p.createdAt.toDate()) : "unknown";

                    const card = el("div", "card");
                    card.id = `flagged-${d.id}`;

                    const header = el("div", "card-header");
                    header.append(span("flagged-label", p.flagReason || "flagged"), span("card-time", time));
                    card.appendChild(header);

                    const textDiv = el("div", "card-text");
                    textDiv.textContent = p.text || "";
                    card.appendChild(textDiv);

                    const meta = el("div", "card-meta");
                    const bySpan = el("span");
                    bySpan.textContent = `by: ${p.authorHandle || "unknown"}`;
                    const likesSpan = el("span");
                    likesSpan.textContent = `likes: ${p.likeCount || 0}`;
                    const repliesSpan = el("span");
                    repliesSpan.textContent = `replies: ${p.replyCount || 0}`;
                    meta.append(bySpan, likesSpan, repliesSpan);
                    card.appendChild(meta);

                    const actions = el("div", "card-actions");

                    const unflagBtn = el("button", "btn-dismiss");
                    unflagBtn.textContent = "unflag (false positive)";
                    unflagBtn.addEventListener("click", () => unflagPost(d.id));
                    actions.appendChild(unflagBtn);

                    const deleteBtn = el("button", "btn-remove");
                    deleteBtn.textContent = "delete post";
                    deleteBtn.addEventListener("click", () => deletePost(d.id));
                    actions.appendChild(deleteBtn);

                    if (p.authorId) {
                        const restrictBtn = el("button", "btn-restrict");
                        restrictBtn.textContent = "restrict author";
                        restrictBtn.addEventListener("click", () => restrictUserDirect(p.authorId, p.authorHandle || ""));
                        actions.appendChild(restrictBtn);
                    }

                    card.appendChild(actions);
                    container.appendChild(card);
                });
            } catch (e) {
                emptyState(container, "error loading flagged posts", e.message);
            }
        }

        // --- Restricted users ---

        async function loadRestricted(container) {
            try {
                const q = query(collection(db, "users"), where("restricted", "==", true), limit(50));
                const snap = await getDocs(q);

                if (snap.empty) {
                    emptyState(container, "no restricted users", "nobody is currently restricted");
                    return;
                }

                container.replaceChildren();
                snap.forEach(d => {
                    const u = d.data();
                    const restrictedAtStr = u.restrictedAt?.toDate?.() ? timeAgo(u.restrictedAt.toDate()) : "";

                    const card = el("div", "card");
                    card.id = `user-${d.id}`;

                    const header = el("div", "card-header");
                    const handleSpan = span("card-type type-user", u.handle || "unknown");
                    header.append(handleSpan, span("card-time", restrictedAtStr));
                    card.appendChild(header);

                    const meta = el("div", "card-meta");
                    const postsSpan = el("span");
                    postsSpan.textContent = `posts: ${u.postCount || 0}`;
                    const followersSpan = el("span");
                    followersSpan.textContent = `followers: ${u.followerCount || 0}`;
                    meta.append(postsSpan, followersSpan);
                    card.appendChild(meta);

                    const actions = el("div", "card-actions");
                    const unrestrictBtn = el("button", "btn-dismiss");
                    unrestrictBtn.textContent = "unrestrict";
                    unrestrictBtn.addEventListener("click", () => unrestrictUser(d.id));
                    actions.appendChild(unrestrictBtn);
                    card.appendChild(actions);

                    container.appendChild(card);
                });
            } catch (e) {
                emptyState(container, "error loading users", e.message);
            }
        }

        // --- Actions ---
        // No `window.X = ...` exports because we no longer use inline onclick.
        // All buttons are wired via addEventListener inside the render loops.

        async function dismissReport(reportId) {
            const uid = auth.currentUser.uid;
            try {
                await updateDoc(doc(db, "reports", reportId), { status: "dismissed", reviewedBy: uid, reviewedAt: serverTimestamp(), action: "dismissed" });
                document.getElementById(`report-${reportId}`)?.remove();
                showToast("report dismissed");
            } catch (e) { showToast("error: " + e.message); }
        }

        async function removePost(reportId, postId) {
            if (!confirm("delete this post permanently?")) return;
            const uid = auth.currentUser.uid;
            try {
                await deleteDoc(doc(db, "posts", postId));
                await updateDoc(doc(db, "reports", reportId), { status: "resolved", reviewedBy: uid, reviewedAt: serverTimestamp(), action: "post_deleted" });
                document.getElementById(`report-${reportId}`)?.remove();
                showToast("post deleted, report resolved");
            } catch (e) { showToast("error: " + e.message); }
        }

        async function restrictUser(reportId, userId, handle) {
            // confirm() renders the message as plain text — no XSS risk
            // even if `handle` contains markup. Same for showToast below.
            if (!confirm(`restrict ${handle || userId}? they won't be able to post.`)) return;
            const uid = auth.currentUser.uid;
            try {
                await updateDoc(doc(db, "users", userId), { restricted: true, restrictedAt: serverTimestamp(), restrictedBy: uid });
                await updateDoc(doc(db, "reports", reportId), { status: "resolved", reviewedBy: uid, reviewedAt: serverTimestamp(), action: "user_restricted" });
                document.getElementById(`report-${reportId}`)?.remove();
                showToast(`${handle || "user"} restricted`);
            } catch (e) { showToast("error: " + e.message); }
        }

        async function restrictUserDirect(userId, handle) {
            if (!confirm(`restrict ${handle || userId}?`)) return;
            const uid = auth.currentUser.uid;
            try {
                await updateDoc(doc(db, "users", userId), { restricted: true, restrictedAt: serverTimestamp(), restrictedBy: uid });
                showToast(`${handle || "user"} restricted`);
            } catch (e) { showToast("error: " + e.message); }
        }

        async function unflagPost(postId) {
            try {
                // Clearing flagged alone wasn't enough — DailyMomentView,
                // WeeklyRecapView, TopView, FeedViewModel, OtherProfileView,
                // and ProfileView all also filter on `concerningContent`,
                // so a post that was flagged AND marked concerning would
                // stay hidden from feeds even after the appeal succeeded.
                // Same for flagReason — leaving it set keeps the audit
                // trail honest but contradicts the "unflagged" state.
                // Clear all three so the post is fully restored to feeds.
                await updateDoc(doc(db, "posts", postId), {
                    flagged: false,
                    concerningContent: false,
                    flagReason: null
                });
                document.getElementById(`flagged-${postId}`)?.remove();
                showToast("post unflagged — now visible in feeds");
            } catch (e) { showToast("error: " + e.message); }
        }

        async function deletePost(postId) {
            if (!confirm("delete this post permanently?")) return;
            try {
                await deleteDoc(doc(db, "posts", postId));
                document.getElementById(`flagged-${postId}`)?.remove();
                showToast("post deleted");
            } catch (e) { showToast("error: " + e.message); }
        }

        async function unrestrictUser(userId) {
            if (!confirm("unrestrict this user? they'll be able to post again.")) return;
            try {
                await updateDoc(doc(db, "users", userId), { restricted: false, restrictedAt: serverTimestamp(), restrictedBy: auth.currentUser.uid });
                document.getElementById(`user-${userId}`)?.remove();
                showToast("user unrestricted");
            } catch (e) { showToast("error: " + e.message); }
        }

        // --- Helpers ---

        function timeAgo(date) {
            const s = Math.floor((Date.now() - date.getTime()) / 1000);
            if (s < 60) return "just now";
            if (s < 3600) return Math.floor(s / 60) + "m ago";
            if (s < 86400) return Math.floor(s / 3600) + "h ago";
            return Math.floor(s / 86400) + "d ago";
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.style.display = "block";
            setTimeout(() => { t.style.display = "none"; }, 2500);
        }
    </script>
</body>
</html>
