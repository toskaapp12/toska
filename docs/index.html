<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toska</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0908;
            color: #e0e2e6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
        }
        .logo {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 48px;
            color: #fff;
            margin-bottom: 8px;
        }
        .tagline {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .links a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 13px;
        }
        .links a:hover {
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">toska</div>
        <div class="tagline">say what you never said</div>
        <div class="links">
            <a href="/terms">terms of service</a>
            <a href="/privacy">privacy policy</a>
        </div>
    </div>
</body>
</html>
